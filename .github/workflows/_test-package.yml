name: _Test a package

on:
  workflow_call:
    inputs:
      package:
        type: string
        required: true
      container_image:
        type: string
        required: true
      node_version:
        type: string
        required: true

jobs:
  test_package:
    name: Test ${{ inputs.package }}
    runs-on: ubuntu-latest
    container:
      image: ${{ inputs.container_image }}
    permissions:
      packages: read
    defaults:
      run:
        working-directory: /app
    steps:
      - name: Prettier cache
        uses: actions/cache@v4
        with:
          path: packages/${{ inputs.package }}/node_modules/.cache/prettier
          key: ${{ runner.os }}-${{ inputs.node_version }}-prettiercache-${{ inputs.package }}-${{ github.ref }}
          restore-keys: |
            ${{ runner.os }}-${{ inputs.node_version }}-prettiercache-${{ inputs.package }}-${{ github.base_ref }}
            ${{ runner.os }}-${{ inputs.node_version }}-prettiercache-${{ inputs.package }}-

      - name: Format check
        run: yarn workspace @soliguide/${{ inputs.package }} format

      - name: Eslint cache
        uses: actions/cache@v4
        with:
          path: packages/${{ inputs.package }}/.eslintcache
          key: ${{ runner.os }}-${{ inputs.node_version }}-eslintcache-${{ inputs.package }}-${{ github.ref }}
          restore-keys: |
            ${{ runner.os }}-${{ inputs.node_version }}-eslintcache-${{ inputs.package }}-${{ github.base_ref }}
            ${{ runner.os }}-${{ inputs.node_version }}-eslintcache-

      - name: Lint
        run: yarn workspace @soliguide/${{ inputs.package }} lint

      - name: Test
        run: yarn workspace @soliguide/${{ inputs.package }} test --coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ inputs.package }}
          path: /app/packages/${{ inputs.package }}/coverage/cobertura-coverage.xml
          if-no-files-found: error
          retention-days: 1
