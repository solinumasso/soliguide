name: Develop - build and deploy

on:
  push:
    branches:
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build all packages (once)
    uses: ./.github/workflows/_build.yml
    secrets: inherit

  deploy_clever_cloud:
    name: Deploy to Clever Cloud (staging)
    uses: ./.github/workflows/_deploy-to-environment.yml
    with:
      environment: staging
    needs:
      - build
    secrets: inherit

  deploy_qovery:
    name: Deploy to Qovery (develop)
    uses: ./.github/workflows/_deploy-to-test-qovery.yml
    # On develop, always force-update every Qovery service so demo reflects
    # HEAD of develop, avoiding stale mutable `develop` tags cached by Qovery.
    with:
      deploy_api: true
      deploy_frontend: true
      deploy_location-api: true
      deploy_web-app: true
      deploy_widget: true
      create: true
    needs:
      - build
    secrets: inherit
