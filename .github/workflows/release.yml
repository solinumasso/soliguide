name: Release - create from develop

on:
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Create release from develop
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: develop
          token: ${{ secrets.GH_TOKEN }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "Team Tech"
          git config user.email "tech@solinum.org"

      # --no-ff ensures the head commit is "chore:..." so that
      # create-release.yml skips (its `if` filters out chore commits).
      # This prevents a race condition with our own SR run below.
      - name: Merge develop into main
        run: |
          git checkout main
          git merge develop --no-ff -m "chore: merge develop for release"
          git push origin main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Semantic Release
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        with:
          extra_plugins: ""
        env:
          GIT_AUTHOR_EMAIL: tech@solinum.org
          GIT_AUTHOR_NAME: Team Tech
          GIT_COMMITTER_EMAIL: tech@solinum.org
          GIT_COMMITTER_NAME: Team Tech
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          GITHUB_REF: refs/heads/main

      # Cherry-pick the SR chore commit (CHANGELOG, package.json versions)
      # back into develop so that main and develop stay in sync.
      - name: Propagate version bump to develop
        if: steps.semantic.outputs.new_release_published == 'true'
        run: |
          CHORE_COMMIT=$(git rev-parse HEAD)
          git checkout develop
          git cherry-pick "$CHORE_COMMIT"
          git push origin develop
