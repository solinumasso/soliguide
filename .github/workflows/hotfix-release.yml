name: Hotfix - release

on:
  workflow_dispatch:

concurrency:
  group: hotfix-release
  cancel-in-progress: false

jobs:
  validate:
    name: Validate hotfix branch
    runs-on: ubuntu-latest
    steps:
      - name: Check branch
        if: github.ref_name != 'hotfix'
        run: |
          echo "::error::This workflow must be dispatched from the 'hotfix' branch"
          exit 1

  build:
    name: Build all packages
    needs:
      - validate
    uses: ./.github/workflows/_build.yml
    secrets: inherit

  test:
    name: Test all packages
    uses: ./.github/workflows/_test-only.yml
    with:
      docker_tag: hotfix
      node_version: ${{ needs.build.outputs.node_version }}
      test_api: true
      test_common: true
      test_common-angular: true
      test_design-system: true
      test_frontend: true
      test_location-api: true
      test_maintenance: true
      test_soligare: true
      test_web-app: true
      test_widget: true
    needs:
      - build
    secrets: inherit

  deploy-staging:
    name: Deploy hotfix to staging
    needs:
      - build
      - test
    uses: ./.github/workflows/_deploy-to-environment.yml
    with:
      environment: staging
      tag: hotfix
    secrets: inherit

  deploy-prod:
    name: Deploy hotfix to production
    needs:
      - build
      - test
    uses: ./.github/workflows/_deploy-to-environment.yml
    with:
      environment: production
      tag: hotfix
    secrets: inherit

  finalize:
    name: Finalize hotfix
    needs:
      - deploy-staging
      - deploy-prod
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: hotfix
          token: ${{ secrets.GH_TOKEN }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "Team Tech"
          git config user.email "tech@solinum.org"

      # --no-ff ensures head commit is "chore:..." so create-release.yml skips
      - name: Merge hotfix into main
        run: |
          git checkout main
          git merge hotfix --no-ff -m "chore: hotfix release"
          git push origin main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Semantic Release
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        with:
          extra_plugins: ""
        env:
          GIT_AUTHOR_EMAIL: tech@solinum.org
          GIT_AUTHOR_NAME: Team Tech
          GIT_COMMITTER_EMAIL: tech@solinum.org
          GIT_COMMITTER_NAME: Team Tech
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          GITHUB_REF: refs/heads/main

      # Merge hotfix into develop, then cherry-pick SR version bump
      - name: Propagate hotfix and version bump to develop
        if: steps.semantic.outputs.new_release_published == 'true'
        run: |
          CHORE_COMMIT=$(git rev-parse HEAD)
          git checkout develop
          git merge hotfix --no-ff -m "fix: merge hotfix into develop"
          git cherry-pick "$CHORE_COMMIT"
          git push origin develop

      - name: Delete hotfix branch
        run: git push origin --delete hotfix
