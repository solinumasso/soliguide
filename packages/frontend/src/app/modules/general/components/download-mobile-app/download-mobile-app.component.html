<div class="banner d-flex" *ngIf="mobileLink && !IS_BOT && !IS_WEBVIEW_APP">
  <div>
    <span class="align-bottom text-black fw-bold"
      >{{ "DISCOVER_NEW_APP" | translate }} 🚀</span
    >
    <br />
  </div>
  <div class="float-end">
    <a [href]="mobileLink" class="btn btn-sm btn-secondary text-nowrap">{{
      "DOWNLOAD" | translate
    }}</a>
  </div>
  <div class="position-absolute text-white close-app" (click)="closeApp()">
    <fa-icon aria-hidden="true" [icon]="['fas', 'times']"></fa-icon>
    <span class="visually-hidden">{{ "CLOSE" | translate }}</span>
  </div>
</div>
