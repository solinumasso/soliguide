<section class="mt-4">
  <span class="label">{{ "WHICH_DAY_ITINERARY" | translate }}</span>
  <div class="input-description">
    {{ "ITINERARY_WILL_BE_EACH_WEEK_SAME_DAY" | translate }}
  </div>
  <div class="row mx-2">
    <div *ngFor="let day of WEEK_DAYS" class="col-md p-0">
      <label [for]="day"
        ><input
          type="checkbox"
          [checked]="openingDays.includes(day)"
          (click)="toogleDay(day)"
          [id]="day"
        />
        <span class="ms-3">
          {{ "DAY_" + day | uppercase | translate }}
        </span>
      </label>
    </div>
  </div>
</section>
