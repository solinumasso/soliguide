<div class="container my-4" *ngIf="place">
  <div class="row">
    <div class="col-9 my-4">
      <h1 class="form-title">
        {{ "CHANGE_PHOTO_OF" | translate : { placeName: place.name } }}
      </h1>
    </div>
    <div class="col-3 text-end my-3">
      <a
        class="btn btn-outline-primary"
        [routerLink]="[routePrefix, 'fiche', place.seo_url]"
        >{{ "SEE_THE_PLACE" | translate }}
      </a>
    </div>
    <div class="col-3 d-none d-md-block">
      <app-form-place-menu [place]="place" step="photos"></app-form-place-menu>
    </div>
    <div class="col-md-9 col-12">
      <div class="form-container">
        <app-upload-photos
          id="photos"
          [photos]="place.photos"
          [placeId]="place.lieu_id"
          [helpPhotos]="true"
          #photos
        ></app-upload-photos>
      </div>
      <div>
        <button
          type="submit"
          class="btn btn-lg btn-primary"
          [disabled]="loading"
          (click)="submitPhotos()"
        >
          <span *ngIf="!loading">{{ "SAVE_AND_CONTINUE" | translate }}</span>
          <span *ngIf="loading"
            ><fa-icon
              aria-hidden="true"
              [icon]="['fas', 'circle-notch']"
              animation="spin"
            >
            </fa-icon>
            {{ "PLEASE_WAIT" | translate }}</span
          >
        </button>
      </div>
    </div>
  </div>
</div>
