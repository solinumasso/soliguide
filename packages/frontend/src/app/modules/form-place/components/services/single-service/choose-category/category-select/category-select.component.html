<div class="category-select">
  <label
    class="form-label fw-bold mb-1"
    [for]="'category-select-' + serviceIndex"
  >
    {{ "CATEGORY" | translate }}
    <span *ngIf="required" class="fst-italic text-danger">*</span>
  </label>

  <div class="category-select__wrapper">
    <!-- Trigger -->
    <button
      type="button"
      [id]="'category-select-' + serviceIndex"
      class="category-select__trigger"
      [class.category-select__trigger--open]="isOpen"
      (click)="toggleDropdown()"
      [attr.aria-expanded]="isOpen"
      aria-haspopup="menu"
    >
      <span *ngIf="!currentPath" class="category-select__placeholder">
        {{ "SELECT_CATEGORY" | translate }}
      </span>
      <span
        *ngIf="currentPath; let path"
        class="d-flex align-items-center gap-2 overflow-hidden"
      >
        <span
          [class]="
            'category-icon category-icon--sm category-icon-' + pathRoot(path).id
          "
          aria-hidden="true"
        ></span>
        <span class="category-select__chip text-truncate">
          {{ pathLeaf(path).id | categoryTranslateKey | translate }}
        </span>
      </span>
      <fa-icon
        [icon]="['fas', 'angle-down']"
        class="category-select__chevron"
        aria-hidden="true"
      ></fa-icon>
    </button>

    <!-- Dropdown panel -->
    <div
      *ngIf="isOpen"
      class="category-select__panel"
      role="menu"
      [attr.aria-label]="'CATEGORY' | translate"
    >
      <!-- Search field -->
      <div class="category-select__search">
        <input
          type="text"
          class="category-select__search-input"
          [placeholder]="'CATEGORY_CHOOSE_PLACEHOLDER' | translate"
          [(ngModel)]="searchQuery"
          (input)="onSearchChange()"
          (click)="$event.stopPropagation()"
        />
      </div>

      <!-- Search results -->
      <ng-container *ngIf="searchQuery.trim(); else navigationMode">
        <ul
          *ngIf="searchResults.length; else noResults"
          class="list-unstyled mb-0 category-select__list"
        >
          <li *ngFor="let result of searchResults">
            <button
              type="button"
              class="category-select__item category-select__item--search d-flex align-items-center gap-2 w-100"
              role="menuitem"
              (click)="selectSearchResult(result)"
            >
              <span
                [class]="
                  'category-icon category-icon--sm category-icon-' +
                  (result.breadcrumb[0] ?? result.node).id
                "
                aria-hidden="true"
              ></span>
              <span class="flex-grow-1 d-flex flex-column overflow-hidden">
                <small
                  *ngIf="result.breadcrumb.length"
                  class="category-select__search-breadcrumb text-muted text-truncate"
                >
                  <ng-container
                    *ngFor="let crumb of result.breadcrumb; let isLast = last"
                  >
                    {{ crumb.id | categoryTranslateKey | translate
                    }}<span *ngIf="!isLast"> › </span>
                  </ng-container>
                </small>
                <span class="text-truncate">{{
                  result.node.id | categoryTranslateKey | translate
                }}</span>
              </span>
            </button>
          </li>
        </ul>
        <ng-template #noResults>
          <p class="category-select__no-results">
            {{ "NO_SEARCH_RESULT" | translate }}
          </p>
        </ng-template>
      </ng-container>

      <!-- Level navigation — works for any number of category levels -->
      <ng-template #navigationMode>
        <!-- Back button — visible when navigated into at least one level -->
        <button
          *ngIf="navigationPath.length > 0"
          type="button"
          class="category-select__back d-flex align-items-center gap-2 w-100"
          (click)="goBack()"
          [attr.aria-label]="'BACK_TO_PREVIOUS_CATEGORY' | translate"
        >
          <fa-icon [icon]="['fas', 'angle-left']" aria-hidden="true"></fa-icon>
          <!-- Root icon is always shown regardless of depth -->
          <span
            [class]="
              'category-icon category-icon--sm category-icon-' +
              navigationPath[0].id
            "
            aria-hidden="true"
          ></span>
          <!-- Depth 1: show root label bold -->
          <span *ngIf="navigationPath.length === 1" class="fw-bold">
            {{ navigationPath[0].id | categoryTranslateKey | translate }}
          </span>
          <!-- Depth 2+: show grandparent (small) above parent (bold) -->
          <div *ngIf="navigationPath.length > 1" class="d-flex flex-column">
            <small class="category-select__back-sublabel text-muted">
              {{
                navigationPath[navigationPath.length - 2].id
                  | categoryTranslateKey
                  | translate
              }}
            </small>
            <span class="fw-bold">
              {{
                navigationPath[navigationPath.length - 1].id
                  | categoryTranslateKey
                  | translate
              }}
            </span>
          </div>
        </button>

        <!-- Items at the current navigation level -->
        <ul class="list-unstyled mb-0 category-select__list">
          <li *ngFor="let item of currentItems">
            <button
              type="button"
              class="category-select__item d-flex align-items-center gap-2 w-100"
              [class.category-select__item--leaf]="item.children.length === 0"
              role="menuitem"
              (click)="drillInto(item)"
            >
              <!-- Full-size icon at root level, small icon when drilled in -->
              <span
                [class]="
                  'category-icon' +
                  (navigationPath.length > 0 ? ' category-icon--sm' : '') +
                  ' category-icon-' +
                  item.id
                "
                aria-hidden="true"
              ></span>
              <span class="flex-grow-1">
                {{ item.id | categoryTranslateKey | translate }}
              </span>
              <fa-icon
                *ngIf="item.children.length > 0"
                [icon]="['fas', 'angle-right']"
                class="category-select__item-chevron"
                aria-hidden="true"
              ></fa-icon>
            </button>
          </li>
        </ul>
      </ng-template>
    </div>
  </div>

  <!-- Confirmation breadcrumb — iterates the full path regardless of depth -->
  <div *ngIf="currentPath; let path" class="category-select__confirm mt-2">
    <span class="flex-grow-1 text-truncate">
      <strong>{{
        pathRoot(path).id | categoryTranslateKey | translate
      }}</strong>
      <ng-container *ngFor="let node of path.nodes.slice(1); let isLast = last">
        <span class="text-muted"> › </span>
        <span>{{ node.id | categoryTranslateKey | translate }}</span>
      </ng-container>
    </span>
  </div>
</div>
