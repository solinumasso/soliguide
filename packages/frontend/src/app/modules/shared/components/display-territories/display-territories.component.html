<div class="status-box" *ngIf="departments.length !== allDepartmentsLength">
  <span *ngFor="let department of departments" class="status status-info m-1">
    {{ DEPARTMENTS_LIST[department].departmentCode }}
  </span>
</div>

<span
  class="status status-info m-1"
  *ngIf="departments.length === allDepartmentsLength"
>
  {{ "ALL_DEPARTMENTS" | translate }}
</span>
