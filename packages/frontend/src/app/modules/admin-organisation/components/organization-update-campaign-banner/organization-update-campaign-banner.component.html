@if(organisation && needUpdated && campaignIsActive && canEdit) {
<div class="alert alert-warning py-3">
  <div class="row align-items-center justify-content-between">
    <div class="col-md-8">
      <strong class="fw-bold">
        {{ "STRUCTURE_NEED_UPDATE" | translate }}
      </strong>
      <p [innerHtml]="'STRUCTURE_TERMINATE_UPDATE' | translate"></p>
    </div>
    <div class="col-md-4 text-end">
      @if (me?.pro) {
      <a
        class="btn btn-block btn-secondary text-black"
        [routerLink]="[routePrefix, 'campaign']"
        (click)="
          captureEvent('click-complete-campaign-update-banner-button', {
            campaign: CAMPAIGN_DEFAULT_NAME
          })
        "
      >
        {{ "ENTER_SEASONAL_CHANGES" | translate }} </a
      >} @else {
      <a
        class="btn btn-block btn-secondary text-black"
        [routerLink]="[
          routePrefix,
          'campaign',
          'orga',
          organisation.organization_id
        ]"
        (click)="
          captureEvent('click-complete-campaign-update-banner-button', {
            campaign: CAMPAIGN_DEFAULT_NAME
          })
        "
      >
        {{ "ENTER_SEASONAL_CHANGES" | translate }}
      </a>
      }
    </div>
  </div>
</div>
}
