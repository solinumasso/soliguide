<div class="helper-container {{ type }}">
  <h3>
    {{ title }}
  </h3>
  <p>
    {{ message }}
  </p>
  <div *ngIf="link">
    <a
      [routerLink]="link"
      class="btn btn-sm btn-primary"
      (click)="clickFunction?.emit()"
    >
      {{ buttonMessage }}
    </a>
  </div>
  <div *ngIf="!link">
    <button
      type="button"
      (click)="clickFunction.emit()"
      class="btn btn-sm btn-primary"
    >
      {{ buttonMessage }}
    </button>
  </div>
</div>
