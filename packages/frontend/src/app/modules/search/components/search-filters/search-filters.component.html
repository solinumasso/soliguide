<div class="filters-chain" *ngIf="!showFilters">
  <app-filter-pill-dropdown
    label="ADMINISTRATIVE_SITUATION"
    icon="file-alt"
    [allLabel]="PUBLICS_LABELS.administrative.all"
    [options]="administrativeOptions"
    [value]="filters?.administrative ?? null"
    name="filterAdministrative"
    (valueChange)="onPublicChange('administrative', $event)"
  ></app-filter-pill-dropdown>

  <app-filter-pill-dropdown
    label="FAMILY_SITUATION"
    icon="users"
    [allLabel]="PUBLICS_LABELS.familialle.all"
    [options]="familialleOptions"
    [value]="filters?.familialle ?? null"
    name="filterFamilialle"
    (valueChange)="onPublicChange('familialle', $event)"
  ></app-filter-pill-dropdown>

  <app-filter-pill-dropdown
    label="OTHER_SITUATION"
    icon="ellipsis-h"
    allLabel="NONE"
    [options]="otherOptions"
    [value]="filters?.other ?? null"
    name="filterOther"
    (valueChange)="onPublicChange('other', $event)"
  ></app-filter-pill-dropdown>

  <app-filter-pill-dropdown
    label="LISTE_LANGUES"
    icon="language"
    allLabel="PUBLICS_ALL"
    [options]="languageOptions"
    [value]="filters?.languages ?? null"
    name="filterLanguage"
    (valueChange)="onLanguageChange($event)"
  ></app-filter-pill-dropdown>

  <label class="filters-chain__field" for="filterAge">
    <span class="filters-chain__field-label">{{ "AGE" | translate }}</span>
    <input
      class="form-control filters-chain__input"
      type="number"
      name="filterAge"
      autocomplete="off"
      max="99"
      id="filterAge"
      maxlength="2"
      min="0"
      [value]="filters.age"
      (keyup.enter)="filterString('age', 'publics', age.value)"
      (change)="filterString('age', 'publics', age.value)"
      #age
    />
  </label>
</div>
