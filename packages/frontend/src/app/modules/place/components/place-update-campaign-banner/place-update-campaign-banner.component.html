<div
  *ngIf="
    place &&
    needUpdate &&
    canEdit &&
    campaignIsActive &&
    place.campaigns.runningCampaign.toUpdate
  "
>
  <div class="alert alert-warning">
    <div class="my-2 fw-bold text-center">
      <div [innerHTML]="'TO_UPDATE_CAMPAIGN_BANNER' | translate"></div>
      <div class="container-md mx-auto">
        <button
          type="button"
          class="btn btn-large col-8 btn-outline-primary mt-3 btn-maj"
          (click)="openNoChangeModal()"
        >
          {{ "NO_CHANGE_THIS_SEASON" | translate }}
        </button>
        <a
          target="_blank"
          class="btn btn-large text-black col-8 btn-secondary mt-3 btn-maj"
          href="{{ routePrefix }}/campaign/fiche/{{ place.lieu_id }}"
          (click)="
            captureEvent({
              name: 'click-complete-campaign-update-button-banner'
            })
          "
        >
          {{ "FILL_SEASONAL_CHANGES" | translate }}
        </a>
      </div>
    </div>
  </div>
</div>

<ng-template #noChangeModal let-modal>
  <app-campaign-no-change-modal
    [place]="place"
    (parentCaptureEvent)="captureEvent($event)"
  ></app-campaign-no-change-modal>
</ng-template>
