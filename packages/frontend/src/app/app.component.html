>
  <img
    src="../assets/images/chat-icon.svg"
    alt="Logo messagerie Signpost"
    aria-hidden="true"
  />
  <span class="visually-hidden">
    {{ "COOKIES_TITLE" | translate }}
  </span>
</button>
<app-nav></app-nav>
<app-download-mobile-app></app-download-mobile-app>
<main id="page">

</main>

></app-footer>
