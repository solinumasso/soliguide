<!DOCTYPE html>

  <head>
    <script>
      // Initialize the dataLayer
      window.dataLayer = window.dataLayer || [];

      // Create the gtag function that pushes to the dataLayer
      function gtag() {
        dataLayer.push(arguments);
      }

      // Set consent defaults
      gtag("consent", "default", {
        analytics_storage:
          localStorage.getItem("silktideCookieChoice_analytics") === "true"
            ? "granted"
            : "denied",
        ad_storage:
          localStorage.getItem("silktideCookieChoice_marketing") === "true"
            ? "granted"
            : "denied",
        ad_user_data:
          localStorage.getItem("silktideCookieChoice_marketing") === "true"
            ? "granted"
            : "denied",
        ad_personalization:
          localStorage.getItem("silktideCookieChoice_marketing") === "true"
            ? "granted"
            : "denied",
        functionality_storage:
          localStorage.getItem("silktideCookieChoice_necessary") === "true"
            ? "granted"
            : "denied",
        security_storage:
          localStorage.getItem("silktideCookieChoice_necessary") === "true"
            ? "granted"
            : "denied",
      });
    </script>

    <!-- Google Tag Manager -->
    <script>
      (function (w, d, s, l, i) {
        w[l] = w[l] || [];

          j = d.createElement(s),
          dl = l != "dataLayer" ? "&l=" + l : "";
        j.async = true;
        j.src = "https://www.googletagmanager.com/gtm.js?id=" + i + dl;
        f.parentNode.insertBefore(j, f);
      })(window, document, "script", "dataLayer", "GTM-W88VRN3M");
    </script>
    <!-- End Google Tag Manager -->

    <meta charset="utf-8" />

    {{ import "/head.prod.html.tpl" }} {{ template "head" }}

    <script src="assets/js/silktide-consent-manager.js"></script>

    <script>
      silktideCookieBannerManager.updateCookieBannerConfig({
        background: {
          showBackground: true,
        },
        cookieIcon: {
          position: "bottomLeft",
        },
        cookieTypes: [
          {
            id: "necessary",
            name: "Necessary",
            description:
              "<p>These cookies are necessary for the website to function properly and cannot be switched off. They help with things like logging in and setting your privacy preferences.</p>",
            required: true,
            onAccept: function () {
              console.log("Add logic for the required Necessary here");
            },
          },
          {
            id: "analytics",
            name: "Analytical",
            description:
              "<p>These cookies help us improve the site by tracking which pages are most popular and how visitors move around the site.</p>",
            defaultValue: true,
            onAccept: function () {
              gtag("consent", "update", {
                analytics_storage: "granted",
              });
              dataLayer.push({
                event: "consent_accepted_analytics",
              });
            },
            onReject: function () {
              gtag("consent", "update", {
                analytics_storage: "denied",
              });
            },
          },
          {
            id: "advertising",
            name: "Advertising",
            description:
              "<p>These cookies provide extra features and personalization to improve your experience. They may be set by us or by partners whose services we use.</p>",
            onAccept: function () {
              gtag("consent", "update", {
                ad_storage: "granted",
                ad_user_data: "granted",
                ad_personalization: "granted",
              });
              dataLayer.push({
                event: "consent_accepted_advertising",
              });
            },
            onReject: function () {
              gtag("consent", "update", {
                ad_storage: "denied",
                ad_user_data: "denied",
                ad_personalization: "denied",
              });
            },
          },
        ],
        text: {
          banner: {
            description:
              '<p>We use cookies on our site to enhance your user experience, provide personalized content, and analyze our traffic. <a href="https://your-website.com/cookie-policy" target="_blank">Cookie Policy.</a></p>',
            acceptAllButtonText: "Accept all",
            acceptAllButtonAccessibleLabel: "Accept all cookies",
            rejectNonEssentialButtonText: "Reject non-essential",
            rejectNonEssentialButtonAccessibleLabel: "Reject non-essential",
            preferencesButtonText: "Preferences",
            preferencesButtonAccessibleLabel: "Toggle preferences",
          },
          preferences: {
            title: "Customize your cookie preferences",
            description:
              "<p>We respect your right to privacy. You can choose not to allow some types of cookies. Your cookie preferences will apply across our website.</p>",
            creditLinkText: "Get this banner for free",
            creditLinkAccessibleLabel: "Get this banner for free",
          },
        },
      });
    </script>
