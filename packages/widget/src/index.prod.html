<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <title>Soliguide, le guide de la solidarité en ligne</title>
    <base href="/" />
    <meta name="viewport" content="initial-scale=1, maximum-scale=4" />
    {{ import "/head.prod.html.tpl" }} {{ template "head" }}
    <meta name="robots" content="noindex,nofollow" />
  </head>
  <body>
    <script>
      window.CURRENT_DATA = {
        frontendUrl: '{{ env "SOLIGUIDE_FRONTEND_URL" }}',
        widgetUrl: '{{ env "SOLIGUIDE_WIDGET_URL" }}',
        locationApiUrl: '{{ env "SOLIGUIDE_LOCATION_API_URL" }}',
        apiUrl: '{{ env "SOLIGUIDE_API_URL" }}',
        environment: '{{ env "SOLIGUIDE_ENV_ID" }}',
        posthogUrl: '{{ env "SOLIGUIDE_POSTHOG_URL" }}',
        posthogApiKey: '{{ env "SOLIGUIDE_POSTHOG_API_KEY" }}'.length
          ? '{{ env "SOLIGUIDE_POSTHOG_API_KEY" }}'
          : undefined,
      };
    </script>
    <app-root></app-root>
  </body>
</html>
